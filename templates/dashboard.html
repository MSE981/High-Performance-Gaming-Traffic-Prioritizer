<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Traffic Console</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; margin: 0; }
        h1 { text-align: center; margin-bottom: 30px; }
        .container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; max-width: 1200px; margin: 0 auto; }
        .panel { background: #2d2d2d; padding: 25px; border-radius: 10px; flex: 1; min-width: 300px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        #speed-gauge { width: 100%; height: 400px; }
        label { display: block; margin-top: 15px; margin-bottom: 5px; color: #ccc; }
        input, select { padding: 12px; width: 100%; box-sizing: border-box; border-radius: 5px; border: 1px solid #555; background: #222; color: white; }
        button { padding: 12px; width: 100%; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; font-size: 16px; margin-top: 25px; }
        button:hover { background: #218838; }
    </style>
</head>
<body>

    <h1>🚀 Gaming Traffic Prioritizer</h1>

    <div class="container">
        <div class="panel">
            <h2>⚙️ System Configuration</h2>
            <form action="/update_config" method="POST">
                <label>Current Mode:</label>
                <select name="mode">
                    <option value="gaming" {% if config.traffic_mode == 'gaming' %}selected{% endif %}>🎮 Gaming Priority (Low Latency)</option>
                    <option value="streaming" {% if config.traffic_mode == 'streaming' %}selected{% endif %}>📺 Streaming Mode (High Throughput)</option>
                </select>

                <label>Bandwidth Limit (Mbps):</label>
                <input type="number" name="limit" value="{{ config.bandwidth_limit }}">

                <button type="submit">💾 Save and Apply</button>
            </form>
        </div>

        <div class="panel">
            <h2>📊 Real-time Network Load</h2>
            <div id="speed-gauge"></div>
        </div>
    </div>

    <script>
        // Initialize ECharts gauge
        var chart = echarts.init(document.getElementById('speed-gauge'));
        var option = {
            series: [{
                type: 'gauge',
                max: 1000, 
                detail: { formatter: '{value} KB/s', fontSize: 22, color: '#fff', valueAnimation: true },
                axisLine: { lineStyle: { width: 15, color: [[0.3, '#67e0e3'], [0.7, '#37a2da'], [1, '#fd666d']] } },
                data: [{ value: 0, name: 'Download Speed' }]
            }]
        };
        chart.setOption(option);

        // Connect to WebSocket
        var socket = io();

        // Receive real-time network data
        socket.on('net_update', function(data) {
            chart.setOption({
                series: [{
                    data: [{ value: data.download, name: 'Download Speed' }]
                }]
            });
        });
    </script>
</body>
</html>
